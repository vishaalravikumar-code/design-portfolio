<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Background</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #a01e1e;   /* fallback while the image loads */
  }

  /* poppy-field backdrop behind everything */
  body {
    background-image: url("poppies.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* ---------- Dithered wave field (over the backdrop) ---------- */
  /* shader is unchanged; it just blends over the image so the poppy
     field reads through the dither texture */
  #dither {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
    width: 100%;
    height: 100%;
    mix-blend-mode: overlay;
    opacity: 0.6;
  }

  /* ---------- Tarot card ---------- */

  /* perspective stage: centres the card and gives it 3D depth */
  .card-stage {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 12;   /* above dither (1), shadow (6) */
    height: min(64vh, 150vw);
    aspect-ratio: 988 / 1568;
    transform: translate(-50%, -50%);
    perspective: 1000px;
  }

  /* the card itself — JS tilts it toward the cursor (rotateX/Y + scale) */
  .card-float {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    will-change: transform;
    /* tight contact shadow for edge grounding; the big cast shadow
       is a separate, light-source-projected element */
    filter: drop-shadow(0 4px 6px rgba(60, 0, 0, 0.35));
  }

  /* dynamic cast shadow — a card-shaped dark shape projected onto the
     red wall by a fixed light source. JS positions/scales it each frame;
     these are just the resting defaults so it looks right before JS runs. */
  .card-shadow {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 6;                 /* over the kolam wall, under the card */
    height: min(64vh, 150vw);
    aspect-ratio: 988 / 1568;
    border-radius: 26px;
    background: #360606;        /* dark maroon: red wall in shadow */
    transform: translate(-50%, -50%) translate(120px, 55px) scale(1.18);
    filter: blur(40px);
    opacity: 0.5;
    will-change: transform, opacity;
    pointer-events: none;
  }

  .card-rim {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    overflow: hidden;
  }


  .card-rim img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(1.05) contrast(1.03);
  }

  /* name lockup in the red field at the top of the card */
  .card-title {
    position: absolute;
    top: 5%;
    left: 7%;
    right: 7%;
    text-align: left;
    color: #f3e9db;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    pointer-events: none;
    text-shadow: 0 1px 12px rgba(60, 0, 0, 0.35);
  }

  .card-title h1 {
    font-family: "Jacquard 12", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(1.8rem, 5.2vh, 3rem);
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: 0.02em;
  }

  /* position line, centered along the bottom edge of the card */
  .card-role {
    position: absolute;
    bottom: 5%;
    left: 7%;
    right: 7%;
    text-align: center;
    color: #f3e9db;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(0.5rem, 1.3vh, 0.75rem);
    font-weight: 500;
    letter-spacing: 0.42em;
    /* offset the trailing tracking so it optically centers */
    margin-right: -0.42em;
    text-transform: uppercase;
    opacity: 0.9;
    pointer-events: none;
    text-shadow: 0 1px 10px rgba(0, 0, 0, 0.55);
  }

  /* sound toggle */
  #sound-toggle {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 20;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(243, 233, 219, 0.25);
    background: rgba(20, 6, 6, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #f3e9db;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    opacity: 0.7;
  }
  #sound-toggle:hover { opacity: 1; transform: scale(1.06); }
  #sound-toggle svg { width: 20px; height: 20px; display: block; }
  #sound-toggle .icon-on { display: none; }
  #sound-toggle.playing .icon-on { display: block; }
  #sound-toggle.playing .icon-off { display: none; }
  /* soft pulse ring while playing */
  #sound-toggle.playing {
    background: rgba(60, 10, 10, 0.6);
    box-shadow: 0 0 0 0 rgba(243, 233, 219, 0.35);
    animation: sound-pulse 2.4s ease-out infinite;
  }
  @keyframes sound-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(243, 233, 219, 0.30); }
    70%  { box-shadow: 0 0 0 14px rgba(243, 233, 219, 0); }
    100% { box-shadow: 0 0 0 0 rgba(243, 233, 219, 0); }
  }
</style>
</head>
<body>

  <canvas id="dither" aria-hidden="true"></canvas>

  <div class="card-shadow" aria-hidden="true"></div>

  <div class="card-stage">
    <div class="card-float">
      <div class="card-rim">
        <img src="card.png" alt="Tarot card">
        <div class="card-title">
          <h1>Vishaal Ravikumar</h1>
        </div>
        <div class="card-role">Sr. Product Designer</div>
      </div>
    </div>
  </div>

  <button id="sound-toggle" aria-label="Toggle ambient sound" title="Ambient sound">
    <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H3v6h3l5 4V5Z"/><line x1="22" y1="9" x2="16" y2="15"/>
      <line x1="16" y1="9" x2="22" y2="15"/>
    </svg>
    <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/>
      <path d="M18.5 6a8 8 0 0 1 0 12"/>
    </svg>
  </button>

  <script>
  /* Dithered wave background — ported from the React Bits "Dither"
     component (react-three-fiber + postprocessing) to a single
     self-contained WebGL2 pass, no dependencies. Same FBM wave field,
     Bayer 8x8 ordered dither and posterization, tuned to the card red. */
  (function () {
    var canvas = document.getElementById('dither');
    var gl = canvas.getContext('webgl2', { antialias: true });
    if (!gl) return;   // graceful: red background shows through

    var VERT =
      '#version 300 es\n' +
      'void main(){\n' +
      '  vec2 p = vec2(float((gl_VertexID << 1) & 2), float(gl_VertexID & 2));\n' +
      '  gl_Position = vec4(p * 2.0 - 1.0, 0.0, 1.0);\n' +
      '}';

    var FRAG =
      '#version 300 es\n' +
      'precision highp float;\n' +
      'out vec4 fragColor;\n' +
      'uniform vec2 resolution;\n' +
      'uniform float time;\n' +
      'uniform float waveSpeed;\n' +
      'uniform float waveFrequency;\n' +
      'uniform float waveAmplitude;\n' +
      'uniform float colorNum;\n' +
      'uniform float pixelSize;\n' +
      'uniform vec2 mousePos;\n' +
      'uniform int enableMouseInteraction;\n' +
      'uniform float mouseRadius;\n' +
      'uniform vec3 darkTone;\n' +
      'uniform vec3 lightTone;\n' +
      'vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}\n' +
      'vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}\n' +
      'vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}\n' +
      'vec2 fade(vec2 t){return t*t*t*(t*(t*6.0-15.0)+10.0);}\n' +
      'float cnoise(vec2 P){\n' +
      '  vec4 Pi=floor(P.xyxy)+vec4(0.0,0.0,1.0,1.0);\n' +
      '  vec4 Pf=fract(P.xyxy)-vec4(0.0,0.0,1.0,1.0);\n' +
      '  Pi=mod289(Pi);\n' +
      '  vec4 ix=Pi.xzxz, iy=Pi.yyww, fx=Pf.xzxz, fy=Pf.yyww;\n' +
      '  vec4 i=permute(permute(ix)+iy);\n' +
      '  vec4 gx=fract(i*(1.0/41.0))*2.0-1.0;\n' +
      '  vec4 gy=abs(gx)-0.5;\n' +
      '  vec4 tx=floor(gx+0.5);\n' +
      '  gx=gx-tx;\n' +
      '  vec2 g00=vec2(gx.x,gy.x), g10=vec2(gx.y,gy.y), g01=vec2(gx.z,gy.z), g11=vec2(gx.w,gy.w);\n' +
      '  vec4 norm=taylorInvSqrt(vec4(dot(g00,g00),dot(g01,g01),dot(g10,g10),dot(g11,g11)));\n' +
      '  g00*=norm.x; g01*=norm.y; g10*=norm.z; g11*=norm.w;\n' +
      '  float n00=dot(g00,vec2(fx.x,fy.x));\n' +
      '  float n10=dot(g10,vec2(fx.y,fy.y));\n' +
      '  float n01=dot(g01,vec2(fx.z,fy.z));\n' +
      '  float n11=dot(g11,vec2(fx.w,fy.w));\n' +
      '  vec2 fx2=fade(Pf.xy);\n' +
      '  vec2 n_x=mix(vec2(n00,n01),vec2(n10,n11),fx2.x);\n' +
      '  return 2.3*mix(n_x.x,n_x.y,fx2.y);\n' +
      '}\n' +
      'const int OCTAVES=4;\n' +
      'float fbm(vec2 p){\n' +
      '  float value=0.0, amp=1.0, freq=waveFrequency;\n' +
      '  for(int i=0;i<OCTAVES;i++){ value+=amp*abs(cnoise(p)); p*=freq; amp*=waveAmplitude; }\n' +
      '  return value;\n' +
      '}\n' +
      'float pattern(vec2 p){ vec2 p2=p-time*waveSpeed; return fbm(p+fbm(p2)); }\n' +
      'const float bayer[64]=float[64](\n' +
      '  0.0/64.0,48.0/64.0,12.0/64.0,60.0/64.0,3.0/64.0,51.0/64.0,15.0/64.0,63.0/64.0,\n' +
      '  32.0/64.0,16.0/64.0,44.0/64.0,28.0/64.0,35.0/64.0,19.0/64.0,47.0/64.0,31.0/64.0,\n' +
      '  8.0/64.0,56.0/64.0,4.0/64.0,52.0/64.0,11.0/64.0,59.0/64.0,7.0/64.0,55.0/64.0,\n' +
      '  40.0/64.0,24.0/64.0,36.0/64.0,20.0/64.0,43.0/64.0,27.0/64.0,39.0/64.0,23.0/64.0,\n' +
      '  2.0/64.0,50.0/64.0,14.0/64.0,62.0/64.0,1.0/64.0,49.0/64.0,13.0/64.0,61.0/64.0,\n' +
      '  34.0/64.0,18.0/64.0,46.0/64.0,30.0/64.0,33.0/64.0,17.0/64.0,45.0/64.0,29.0/64.0,\n' +
      '  10.0/64.0,58.0/64.0,6.0/64.0,54.0/64.0,9.0/64.0,57.0/64.0,5.0/64.0,53.0/64.0,\n' +
      '  42.0/64.0,26.0/64.0,38.0/64.0,22.0/64.0,41.0/64.0,25.0/64.0,37.0/64.0,21.0/64.0);\n' +
      'vec3 dither(vec2 fragBlock, vec3 color){\n' +
      '  int x=int(mod(fragBlock.x,8.0));\n' +
      '  int y=int(mod(fragBlock.y,8.0));\n' +
      '  float threshold=bayer[y*8+x]-0.25;\n' +
      '  float st=1.0/(colorNum-1.0);\n' +
      '  color+=threshold*st;\n' +
      '  color=clamp(color-0.2,0.0,1.0);\n' +
      '  return floor(color*(colorNum-1.0)+0.5)/(colorNum-1.0);\n' +
      '}\n' +
      'void main(){\n' +
      '  vec2 block=floor(gl_FragCoord.xy/pixelSize);\n' +
      '  vec2 pfrag=(block+0.5)*pixelSize;\n' +
      '  vec2 uv=pfrag/resolution;\n' +
      '  uv-=0.5;\n' +
      '  uv.x*=resolution.x/resolution.y;\n' +
      '  float f=pattern(uv);\n' +
      '  if(enableMouseInteraction==1){\n' +
      '    vec2 m=(mousePos/resolution-0.5)*vec2(1.0,-1.0);\n' +
      '    m.x*=resolution.x/resolution.y;\n' +
      '    float d=length(uv-m);\n' +
      '    f-=0.5*(1.0-smoothstep(0.0,mouseRadius,d));\n' +
      '  }\n' +
      '  vec3 col=mix(darkTone,lightTone,f);\n' +
      '  col=dither(block,col);\n' +
      '  fragColor=vec4(col,1.0);\n' +
      '}';

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        console.error('dither shader:', gl.getShaderInfoLog(s));
      return s;
    }
    var prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(prog);
    gl.useProgram(prog);
    var vao = gl.createVertexArray();
    gl.bindVertexArray(vao);

    var U = {};
    ['resolution','time','waveSpeed','waveFrequency','waveAmplitude','colorNum',
     'pixelSize','mousePos','enableMouseInteraction','mouseRadius','darkTone','lightTone']
      .forEach(function (n) { U[n] = gl.getUniformLocation(prog, n); });

    // ── parameters (React Bits defaults, colours tuned to the card red) ──
    var params = {
      waveSpeed: 0.05, waveFrequency: 3.0, waveAmplitude: 0.3,
      colorNum: 4.0, pixelSize: 2.0, mouseRadius: 0.3, enableMouse: 1,
      dark: [0.30, 0.03, 0.03],   // deep maroon
      light: [0.85, 0.20, 0.16]   // bright vermilion
    };

    var mouse = [0, 0];
    window.addEventListener('mousemove', function (e) {
      mouse[0] = e.clientX * (canvas.width / window.innerWidth);
      mouse[1] = e.clientY * (canvas.height / window.innerHeight);
    }, { passive: true });

    function resize() {
      var w = window.innerWidth, h = window.innerHeight;   // dpr = 1
      canvas.width = w; canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
    window.addEventListener('resize', resize);
    resize();

    function draw(now) {
      gl.useProgram(prog);
      gl.bindVertexArray(vao);
      gl.uniform2f(U.resolution, canvas.width, canvas.height);
      gl.uniform1f(U.time, now * 0.001);
      gl.uniform1f(U.waveSpeed, params.waveSpeed);
      gl.uniform1f(U.waveFrequency, params.waveFrequency);
      gl.uniform1f(U.waveAmplitude, params.waveAmplitude);
      gl.uniform1f(U.colorNum, params.colorNum);
      gl.uniform1f(U.pixelSize, params.pixelSize);
      gl.uniform2f(U.mousePos, mouse[0], mouse[1]);
      gl.uniform1i(U.enableMouseInteraction, params.enableMouse);
      gl.uniform1f(U.mouseRadius, params.mouseRadius);
      gl.uniform3fv(U.darkTone, params.dark);
      gl.uniform3fv(U.lightTone, params.light);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(draw);
    }
    // render one frame immediately (works even where rAF is throttled)
    draw(performance.now());
    requestAnimationFrame(draw);
  })();
  </script>

  <script>
  /* Tilted card (ported from the React Bits "TiltedCard", motion/react)
     + light-source-cast shadow that responds to it.
     The card tilts toward the cursor (rotateX/rotateY) and scales up on
     hover, all on critically-damped springs matching motion's
     {stiffness:100, damping:30, mass:2}. It no longer moves on its own.
     The shadow is re-wired: as the card lifts (hover scale) it rises off
     the red "wall", so its light-projected shadow grows, offsets and
     fades; the card's tilt nudges the shadow sideways. */
  (function () {
    var stage = document.querySelector('.card-stage');
    var card = document.querySelector('.card-float');
    var shadow = document.querySelector('.card-shadow');

    var ROTATE_AMPLITUDE = 14;
    var SCALE_ON_HOVER = 1.06;

    // fixed point light, up and to the left; shadow casts down-right
    var LIGHT = { fx: -0.42, fy: -0.30, z: 1300 };

    // spring channels (motion/react physical spring: a = (-k·x - c·v)/m)
    function S(x) { return { x: x, v: 0, t: x }; }
    var rx = S(0), ry = S(0), sc = S(1);
    var K = 100, C = 30, M = 2;
    function integrate(s, dt) {
      var a = (-K * (s.x - s.t) - C * s.v) / M;
      s.v += a * dt; s.x += s.v * dt;
    }

    var hovering = false;
    stage.addEventListener('mousemove', function (e) {
      var r = stage.getBoundingClientRect();
      var ox = e.clientX - r.left - r.width / 2;
      var oy = e.clientY - r.top - r.height / 2;
      rx.t = (oy / (r.height / 2)) * -ROTATE_AMPLITUDE;
      ry.t = (ox / (r.width / 2)) * ROTATE_AMPLITUDE;
    });
    stage.addEventListener('mouseenter', function () {
      hovering = true; sc.t = SCALE_ON_HOVER;
    });
    stage.addEventListener('mouseleave', function () {
      hovering = false; sc.t = 1; rx.t = 0; ry.t = 0;
    });

    var last = performance.now();
    function frame(now) {
      var dt = Math.min((now - last) / 1000, 0.033); last = now;
      integrate(rx, dt); integrate(ry, dt); integrate(sc, dt);

      card.style.transform =
        'rotateX(' + rx.x.toFixed(3) + 'deg) rotateY(' + ry.x.toFixed(3) +
        'deg) scale(' + sc.x.toFixed(4) + ')';

      // --- light-projected shadow, driven by the current pose ---
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var Lx = cx + LIGHT.fx * W, Ly = cy + LIGHT.fy * H;

      // hover lift (0..1) raises the card off the wall
      var lift = (sc.x - 1) / (SCALE_ON_HOVER - 1);
      lift = Math.max(0, Math.min(1.3, lift));
      var z = 130 + 150 * lift;                 // height above wall
      var k = LIGHT.z / (LIGHT.z - z);

      var Sx = Lx + (cx - Lx) * k;
      var Sy = Ly + (cy - Ly) * k;
      // the tilt nudges where the shadow falls
      var dx = (Sx - cx) + ry.x * 2.2;
      var dy = (Sy - cy) - rx.x * 2.2;
      var opacity = 0.5 - 0.12 * lift;          // fainter when higher
      var shTilt = ry.x * 0.25;

      shadow.style.transform =
        'translate(-50%, -50%) translate(' + dx.toFixed(1) + 'px, ' +
        dy.toFixed(1) + 'px) rotate(' + shTilt.toFixed(3) + 'deg) scale(' +
        k.toFixed(3) + ')';
      shadow.style.opacity = opacity.toFixed(3);

      requestAnimationFrame(frame);
    }

    // render one pose immediately (works even where rAF is throttled)
    frame(performance.now());
    requestAnimationFrame(frame);
  })();
  </script>

  <script>
  /* Dark-fantasy analog synth — arpeggiated suspended chords, 1970s
     progressive feel. Pure Web Audio, no dependencies. Detuned-saw voices
     through a resonant low-pass with per-note pluck envelopes; an 8th-note
     arpeggiator cycles suspended voicings over an 8-bar Aeolian/harmonic-
     minor progression, under a low drone, slow filter breathing, tape
     delay and a generated convolution reverb. Starts on user gesture. */
  (function () {
    var btn = document.getElementById('sound-toggle');
    var ctx = null, master = null, tone = null, lfoDepth = null,
        delaySend = null, revSend = null;
    var started = false, playing = false, timer = null;
    var BPM = 90, stepDur = 60 / BPM / 2;   // eighth notes
    var step = 0, nextTime = 0;

    function mtof(m) { return 440 * Math.pow(2, (m - 69) / 12); }

    // suspended voicings (no thirds) — 6-note ascending arps, ~2 octaves.
    // roots walk a dark A-minor path with a harmonic-minor (E major) cadence.
    var chords = [
      { arp: [57, 62, 64, 69, 74, 76], bass: 45 }, // Asus4  A D E
      { arp: [53, 55, 60, 65, 67, 72], bass: 41 }, // Fsus2  F G C
      { arp: [55, 60, 62, 67, 72, 74], bass: 43 }, // Gsus4  G C D
      { arp: [57, 59, 64, 69, 71, 76], bass: 45 }, // Asus2  A B E
      { arp: [50, 55, 57, 62, 67, 69], bass: 38 }, // Dsus4  D G A
      { arp: [58, 60, 65, 70, 72, 77], bass: 46 }, // Bbsus2 Bb C F
      { arp: [52, 57, 59, 64, 69, 71], bass: 40 }, // Esus4  E A B
      { arp: [52, 59, 64, 68, 71, 76], bass: 40 }  // E(maj) E B E G# B  → cadence
    ];
    var STEPS_PER_CHORD = 8; // one bar

    // soft-clip curve for mild analog saturation (tanh, normalised)
    function makeDriveCurve(k) {
      var n = 1024, curve = new Float32Array(n), t = Math.tanh(k);
      for (var i = 0; i < n; i++) {
        var x = (i / (n - 1)) * 2 - 1;
        curve[i] = Math.tanh(k * x) / t;
      }
      return curve;
    }

    function makeReverbIR(seconds, decay) {
      var rate = ctx.sampleRate, len = Math.floor(rate * seconds);
      var buf = ctx.createBuffer(2, len, rate);
      for (var ch = 0; ch < 2; ch++) {
        var d = buf.getChannelData(ch);
        for (var i = 0; i < len; i++)
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
      }
      return buf;
    }

    function initAudio() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();

      master = ctx.createGain(); master.gain.value = 0.0001;
      master.connect(ctx.destination);

      // mild analog saturation, then a gentle tone-shaping low-pass
      var drive = ctx.createWaveShaper();
      drive.curve = makeDriveCurve(2.4); drive.oversample = '2x';
      drive.connect(master);
      tone = ctx.createBiquadFilter(); tone.type = 'lowpass';
      tone.frequency.value = 4600; tone.Q.value = 0.6;
      tone.connect(drive);

      // tape-style feedback delay (dotted-eighth-ish), now warmer & deeper
      var delay = ctx.createDelay(1.0);
      delay.delayTime.value = stepDur * 1.5;
      var fb = ctx.createGain(); fb.gain.value = 0.46;
      var dTone = ctx.createBiquadFilter(); dTone.type = 'lowpass'; dTone.frequency.value = 2400;
      var dSat = ctx.createWaveShaper(); dSat.curve = makeDriveCurve(1.6);  // tape grit in the repeats
      delay.connect(dSat); dSat.connect(dTone); dTone.connect(fb); fb.connect(delay);
      delay.connect(tone);
      delaySend = ctx.createGain(); delaySend.gain.value = 0.34; delaySend.connect(delay);

      // tape wow & flutter — slowly modulate the delay time
      var flutter = ctx.createOscillator(); flutter.type = 'sine'; flutter.frequency.value = 0.9;
      var flutterAmt = ctx.createGain(); flutterAmt.gain.value = 0.0016;
      flutter.connect(flutterAmt); flutterAmt.connect(delay.delayTime); flutter.start();
      var wow = ctx.createOscillator(); wow.type = 'sine'; wow.frequency.value = 0.13;
      var wowAmt = ctx.createGain(); wowAmt.gain.value = 0.0032;
      wow.connect(wowAmt); wowAmt.connect(delay.delayTime); wow.start();

      // convolution reverb — longer tail, more of it in the mix
      var conv = ctx.createConvolver(); conv.buffer = makeReverbIR(3.6, 2.3);
      var revReturn = ctx.createGain(); revReturn.gain.value = 0.62;
      conv.connect(revReturn); revReturn.connect(tone);
      revSend = ctx.createGain(); revSend.gain.value = 0.42; revSend.connect(conv);

      // slow filter "breathing" LFO shared by all voices
      var lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.05;
      lfoDepth = ctx.createGain(); lfoDepth.gain.value = 260;
      lfo.connect(lfoDepth); lfo.start();
    }

    function voice(midi, time, dur, vel, opts) {
      opts = opts || {};
      var f = mtof(midi);
      var o1 = ctx.createOscillator(), o2 = ctx.createOscillator(),
          sub = ctx.createOscillator();
      o1.type = 'sawtooth'; o2.type = 'sawtooth'; sub.type = 'triangle';
      o1.frequency.value = f; o2.frequency.value = f; sub.frequency.value = f / 2;
      o1.detune.value = -7; o2.detune.value = 7;   // analog width

      var filt = ctx.createBiquadFilter(); filt.type = 'lowpass';
      filt.Q.value = opts.q != null ? opts.q : 7;
      lfoDepth.connect(filt.frequency);            // shared breathing

      var amp = ctx.createGain(); amp.gain.value = 0;
      o1.connect(filt); o2.connect(filt); sub.connect(filt);
      filt.connect(amp);
      amp.connect(tone);
      if (opts.send !== false) { amp.connect(delaySend); amp.connect(revSend); }

      var base = opts.base != null ? opts.base : 300;
      var peak = base + (opts.peak != null ? opts.peak : 2600) * vel;
      filt.frequency.setValueAtTime(base, time);
      filt.frequency.linearRampToValueAtTime(peak, time + 0.02);
      filt.frequency.exponentialRampToValueAtTime(base + 120, time + dur * 0.9);

      var atk = opts.atk != null ? opts.atk : 0.008;
      amp.gain.setValueAtTime(0, time);
      amp.gain.linearRampToValueAtTime(vel, time + atk);
      amp.gain.exponentialRampToValueAtTime(0.0001, time + dur);

      [o1, o2, sub].forEach(function (o) { o.start(time); o.stop(time + dur + 0.05); });
    }

    function scheduleStep(s, time) {
      var ci = Math.floor(s / STEPS_PER_CHORD) % chords.length;
      var local = s % STEPS_PER_CHORD;
      var chord = chords[ci];

      // arpeggio note (pattern length 6 vs 8-step bar → gentle phasing)
      var note = chord.arp[s % chord.arp.length];
      var accent = (local % 2 === 0);
      voice(note, time, stepDur * 1.9, accent ? 0.34 : 0.22,
            { base: 300, peak: 2700, q: 8 });

      // low drone + pad at each bar change
      if (local === 0) {
        voice(chord.bass, time, stepDur * 8 * 1.02, 0.5,
              { base: 160, peak: 500, q: 3, atk: 0.05, send: false });
        // soft sustained fifth pad, heavy in the reverb
        voice(chord.bass + 19, time, stepDur * 8 * 1.02, 0.10,
              { base: 400, peak: 700, q: 2, atk: 0.6 });
      }
    }

    function scheduler() {
      while (nextTime < ctx.currentTime + 0.12) {
        scheduleStep(step, nextTime);
        step++; nextTime += stepDur;
      }
    }

    function start() {
      if (!started) { initAudio(); started = true; }
      if (ctx.state === 'suspended') ctx.resume();
      step = 0; nextTime = ctx.currentTime + 0.08;
      master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(Math.max(master.gain.value, 0.0001), ctx.currentTime);
      master.gain.exponentialRampToValueAtTime(0.78, ctx.currentTime + 1.5);
      timer = setInterval(scheduler, 25);
      playing = true; btn.classList.add('playing');
    }

    function stop() {
      if (!ctx) return;
      master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value, ctx.currentTime);
      master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
      clearInterval(timer); timer = null;
      playing = false; btn.classList.remove('playing');
    }

    btn.addEventListener('click', function () {
      if (playing) stop(); else start();
    });
    // expose for quick diagnostics
    window.__synth = { start: start, stop: stop, get state(){ return ctx && ctx.state; } };
  })();
  </script>

</body>
